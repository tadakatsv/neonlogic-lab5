<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Контакти та Бронювання | NEON LOGIC</title>
    
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
</head>
<body class="d-flex flex-column min-vh-100">

    <header class="navbar navbar-expand navbar-dark bg-black sticky-top py-2">
        <div class="container flex-column flex-sm-row gap-2">
            <a class="navbar-brand logo m-0" href="index.html">NEON LOGIC</a>
            <nav class="mobile-nav">
                <ul class="navbar-nav d-flex flex-row gap-3">
                    <li class="nav-item"><a class="nav-link p-2" href="index.html">Головна</a></li>
                    <li class="nav-item"><a class="nav-link p-2" href="about.html">Про клуб</a></li>
                    <li class="nav-item"><a class="nav-link p-2" href="calendar.html">Афіша</a></li>
                    <li class="nav-item"><a class="nav-link active p-2" href="contacts.html">Інфо</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="flex-grow-1 py-4">
        <div class="container">
            <h1 class="h2 text-uppercase mb-4 text-center text-sm-start" style="font-family: 'JetBrains Mono', monospace;">Резерв &amp; Інфо</h1>
            
            <div class="row g-4">
                <div class="col-12">
                    <form id="mobileForm" class="p-3 bg-grey-zone" novalidate>
                        <div class="mb-3">
                            <label for="mName" class="form-label small text-uppercase text-muted">Ім'я</label>
                            <input type="text" class="form-control m-input" id="mName" autocomplete="name" required>
                        </div>
                        <div class="mb-3">
                            <label for="mPhone" class="form-label small text-uppercase text-muted">Телефон</label>
                            <input type="tel" class="form-control m-input" id="mPhone" placeholder="+380" autocomplete="tel" required>
                        </div>
                        <button type="submit" class="btn btn-neon text-uppercase rounded-0 w-100 py-3 mt-2">Резерв</button>
                    </form>
                </div>
                
                <div class="col-12 text-center text-sm-start">
                    <div class="p-3 border-start border-2 border-neon-custom">
                        <p class="text-muted small text-uppercase mb-1">Адреса</p>
                        <p class="fw-bold mb-3">Одеса, Аркадійська Алея, 4</p>
                        
                        <p class="text-muted small text-uppercase mb-1">Клікніть для дзвінка</p>
                        <p class="mb-0"><a href="tel:+380632402026" class="mobile-phone-link">+38 (063) 240-20-26</a></p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="bg-black py-4 mt-auto text-center">
        <div class="container">
            <p class="footer-text m-0 text-uppercase">&copy; 2026 NEON LOGIC. NIGHT CLUB.</p>
        </div>
    </footer>

    <script>
        document.getElementById('mobileForm').addEventListener('submit', function(e) {
            e.preventDefault();
            if(this.checkValidity()) {
                alert('Запит надіслано! Очікуйте дзвінка.');
                this.reset();
            } else {
                this.classList.add('was-validated');
            }
        });
    </script>
</body>
</html>
